openapi: 3.1.0
info:
  title: GramartEnglish Backend API
  version: 1.8.0
  description: |
    Local HTTP API exposed by the embedded Node.js backend to the GramartEnglish
    macOS application. Binds only to 127.0.0.1 on an ephemeral port; never
    reachable from the network. All endpoints require the request header
    `x-correlation-id` (UUID v4) generated by the client and propagated by the
    backend through every log line and every LLM call.
servers:
  - url: http://127.0.0.1:{port}/v1
    variables:
      port:
        default: "0"
        description: Ephemeral port chosen at backend startup (handshake via stdout).
components:
  parameters:
    CorrelationId:
      in: header
      name: x-correlation-id
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CEFRLevel:
      type: string
      enum: [A1, A2, B1, B2, C1, C2]
    HealthResponse:
      type: object
      required: [status, version, schemaVersion]
      properties:
        status: { type: string, enum: [ok] }
        version: { type: string, description: "Backend SemVer" }
        schemaVersion: { type: integer, description: "SQLite user_version" }
        ollamaAvailable: { type: boolean }
    PlacementRequest:
      type: object
      properties:
        seed: { type: integer, nullable: true, description: "Optional deterministic seed for tests" }
    PlacementQuestion:
      type: object
      required: [id, word, sentence, options, level]
      properties:
        id: { type: string, format: uuid }
        word: { type: string }
        sentence: { type: string, description: "Real sentence using the word; empty if no example exists." }
        options:
          type: array
          minItems: 4
          maxItems: 4
          items: { type: string }
        level: { $ref: '#/components/schemas/CEFRLevel' }
    PlacementStartResponse:
      type: object
      required: [placementId, questions]
      properties:
        placementId: { type: string, format: uuid }
        questions:
          type: array
          minItems: 12
          items: { $ref: '#/components/schemas/PlacementQuestion' }
    PlacementSubmitRequest:
      type: object
      required: [placementId, answers]
      properties:
        placementId: { type: string, format: uuid }
        answers:
          type: array
          items:
            type: object
            required: [questionId, optionIndex]
            properties:
              questionId: { type: string, format: uuid }
              optionIndex: { type: integer, minimum: 0, maximum: 3 }
    PlacementResultResponse:
      type: object
      required: [estimatedLevel, perLevelScores]
      properties:
        estimatedLevel: { $ref: '#/components/schemas/CEFRLevel' }
        perLevelScores:
          type: object
          additionalProperties:
            type: object
            properties:
              attempted: { type: integer }
              correct: { type: integer }
    LessonMode:
      type: string
      enum:
        - read_pick_meaning
        - listen_pick_word
        - listen_pick_meaning
        - listen_type
        - write_pick_word
        - write_type_word
        - write_fill_gaps
        - conjugate_pick_form
      description: |
        The mode a lesson is played in.
          - read_pick_meaning   (v1.0+): see English word in context, pick Spanish meaning
          - listen_pick_word    (v1.2+): hear audio, pick English word from 4 options
          - listen_pick_meaning (v1.2+): hear audio, pick Spanish meaning from 4 options
          - listen_type         (v1.2+): hear audio, type the word (Levenshtein ≤ 1)
          - write_pick_word     (v1.3+): see Spanish meaning, pick English word from 4 options
          - write_type_word     (v1.3+): see Spanish meaning, type the English word
          - write_fill_gaps     (v1.5+): see Spanish + masked English (e.g. `w__th_r`), type the missing letters. Server returns `maskedWord` for every question. Words ≤ 3 letters auto-promote to a first-letter scaffold (e.g. `eat` → `e__`, `go` → `g_`); mode stays write_fill_gaps for mastery axis purity (v1.5.1+).
          - conjugate_pick_form (v1.6+): see "Pasado simple de **<es>**", pick the English past form from 4 options. Distractor recipe: [over_regularized, base, past_participle, +1 same-level past] minus collisions with the answer. F004 US1; v1.6.0 ships simple_past only, levels A2 + B1, 60-verb hand-curated corpus.
    LessonStartRequest:
      type: object
      required: [level]
      properties:
        level: { $ref: '#/components/schemas/CEFRLevel' }
        mode:
          $ref: '#/components/schemas/LessonMode'
          description: Optional; defaults to read_pick_meaning if omitted (v1.2.0).
    LessonQuestion:
      type: object
      required: [id, word, options, position]
      properties:
        id: { type: string, format: uuid }
        word:
          type: string
          description: |
            Canonical English word. Used for TTS playback and as the answer
            key for typed modes. ALWAYS present.
        prompt:
          type: string
          description: |
            v1.3+. Spanish meaning the client renders as the question stimulus
            for write modes (`write_pick_word`, `write_type_word`,
            `write_fill_gaps`). Absent for read + listen modes.
        maskedWord:
          type: string
          description: |
            Scaffolded English word with underscores in removed positions
            (e.g. `w__th_r`). v1.5.0+ populated for all `write_fill_gaps`
            questions whose target word has length > 3 using vowels-first
            masking. v1.5.1+ also populated for short words (≤ 3 letters)
            using a first-letter anchor scaffold (e.g. `eat` → `e__`, `go`
            → `g_`). Absent only for the defensive 1-letter edge case (not
            represented in the production corpus).
        options:
          type: array
          minItems: 4
          maxItems: 4
          items: { type: string }
        position: { type: integer }
        verbBase:
          type: string
          description: |
            v1.6+. Populated only for `conjugate_pick_form` — English base form
            of the verb being conjugated (e.g. "go" when the answer is "went").
        targetTense:
          type: string
          enum: [simple_past]
          description: |
            v1.6+. Populated only for `conjugate_pick_form`. v1.6.0 ships
            `simple_past` only; the enum reserves room for additional tenses
            (`past_participle`, `gerund`, `third_person`) in future releases.
        exampleEs:
          type: string
          description: |
            v1.6.0+ (patch). Populated only for `conjugate_pick_form` —
            Spanish example sentence with `___` marking the verb slot
            (e.g. "Ayer ___ tacos."). Disambiguates tenses Spanish
            distinguishes (preterite vs imperfect) but English collapses
            (both → "ate"). Rendered below the prompt header in a
            secondary style so it supports — doesn't compete with — the
            hero infinitive.
        exampleEn:
          type: string
          description: |
            v1.6.0+ (patch). Populated only for `conjugate_pick_form` —
            English translation of `exampleEs` with the verb already
            conjugated. The client reveals it after the user answers as
            reinforcement, never before as a hint.
    LessonStartResponse:
      type: object
      required: [lessonId, questions]
      properties:
        lessonId: { type: string, format: uuid }
        mode:
          $ref: '#/components/schemas/LessonMode'
          description: The mode the lesson was started in (echoed back; v1.2.0).
        questions:
          type: array
          minItems: 10
          maxItems: 10
          items: { $ref: '#/components/schemas/LessonQuestion' }
    AnswerRequest:
      type: object
      required: [questionId, answerMs]
      properties:
        questionId: { type: string, format: uuid }
        optionIndex:
          type: integer
          minimum: 0
          maximum: 3
          description: |
            Required for option-based modes. Mutually exclusive with `typedAnswer`.
        typedAnswer:
          type: string
          minLength: 1
          maxLength: 80
          description: |
            Required for typed modes (`listen_type`, `write_type_word`,
            `write_fill_gaps`). Trimmed, case-insensitive. Levenshtein ≤ 1
            of the canonical English spelling counts as correct.
        hintUsed:
          type: boolean
          description: |
            v1.3+. True when the user revealed letters via the hint button
            during a typed question. Backend zeroes the consecutiveCorrect
            streak even on a correct answer — no mastery credit (FR-009).
            Default false / absent.
        answerMs: { type: integer, minimum: 0 }
    AnswerResponse:
      type: object
      required: [outcome, correctIndex, correctOption, canonicalDefinition]
      properties:
        outcome: { type: string, enum: [correct, incorrect, skipped] }
        correctIndex:
          type: integer
          minimum: 0
          maximum: 3
          description: |
            For option-based modes, the 0..3 index of the correct option. For
            `listen_type` this is set to 0 and clients MUST ignore it — the
            canonical answer is in `correctOption`.
        correctOption:
          type: string
          description: |
            Option-based modes: text of the correct option (Spanish for
            read_pick_meaning/listen_pick_meaning, English for listen_pick_word).
            For listen_type: the canonical English spelling.
        canonicalDefinition: { type: string, description: "Canonical English definition (always returned)" }
        typedAnswerEcho:
          type: string
          description: |
            Present only for `listen_type` (v1.2.0). Echoes the user's typed
            answer so the UI can show typo correction side-by-side with the
            canonical spelling (FR-007a).
        feedbackHint:
          type: string
          description: |
            v1.8.0 (F007). Optional Spanish teaching string surfaced
            post-answer when the learner committed to a recognised
            L1-interference error pattern. Currently emitted for the
            over-regularization of irregular verbs (e.g. typed "goed" for
            `go` → `'Casi — "goed" es el error típico, pero "go" es
            irregular. La forma correcta es **went**.'`). Markdown-formatted
            (`**bold**` segments allowed). Absent in all other cases;
            clients MUST tolerate its absence.
    LessonSummaryResponse:
      type: object
      required: [lessonId, score, skipped, wrong, total, missedWords]
      properties:
        lessonId: { type: string, format: uuid }
        score: { type: integer, description: "Correct answers (excludes skipped)" }
        skipped: { type: integer, description: "Count of \"I don't know\" answers" }
        wrong: { type: integer, description: "Wrong answers (excludes skipped)" }
        total: { type: integer }
        missedWords:
          type: array
          items:
            type: object
            required: [word, canonicalDefinition, outcome]
            properties:
              word: { type: string }
              canonicalDefinition: { type: string }
              outcome: { type: string, enum: [incorrect, skipped] }
    ExamplesResponse:
      type: object
      required: [examples, sourceIds, generatedBy, fallback]
      properties:
        examples:
          type: array
          minItems: 1
          maxItems: 3
          items: { type: string }
        sourceIds:
          type: array
          items: { type: integer }
          description: "RAGSource ids used as grounding"
        generatedBy:
          type: string
          enum: [llm, fallback_canonical]
        fallback:
          type: boolean
          description: "True if the LLM was unavailable and canonical examples were returned"
    ContextualDefinitionResponse:
      type: object
      required: [definition, generatedBy, fallback]
      properties:
        definition: { type: string }
        sourceIds:
          type: array
          items: { type: integer }
        generatedBy: { type: string, enum: [llm, fallback_canonical] }
        fallback: { type: boolean }
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        correlationId: { type: string, format: uuid }
paths:
  /health:
    get:
      summary: Liveness + version probe
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
  /levels:
    get:
      summary: Returns the list of supported CEFR levels with localized labels
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [code, label]
                  properties:
                    code: { $ref: '#/components/schemas/CEFRLevel' }
                    label: { type: string }
  /placement/start:
    post:
      summary: Begin a placement test
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlacementRequest' }
      responses:
        '200':
          description: Questions to present
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlacementStartResponse' }
  /placement/submit:
    post:
      summary: Submit placement answers and receive an estimated level
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlacementSubmitRequest' }
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlacementResultResponse' }
        '400':
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /lessons:
    post:
      summary: Start a new 10-question lesson
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LessonStartRequest' }
      responses:
        '200':
          description: Lesson created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LessonStartResponse' }
  /lessons/{lessonId}/answers:
    post:
      summary: Submit an answer to a single question
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - in: path
          name: lessonId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnswerRequest' }
      responses:
        '200':
          description: Result of the answer
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnswerResponse' }
  /lessons/{lessonId}/skip:
    post:
      summary: Skip a question ("I don't know")
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - in: path
          name: lessonId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [questionId, answerMs]
              properties:
                questionId: { type: string, format: uuid }
                answerMs: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Skip recorded; correct answer revealed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnswerResponse' }
  /lessons/{lessonId}/complete:
    post:
      summary: Mark the lesson as completed and return the summary
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - in: path
          name: lessonId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LessonSummaryResponse' }
  /words/{word}/examples:
    get:
      summary: RAG-grounded usage examples for a word
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - in: path
          name: word
          required: true
          schema: { type: string }
        - in: query
          name: level
          required: true
          schema: { $ref: '#/components/schemas/CEFRLevel' }
      responses:
        '200':
          description: Examples
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExamplesResponse' }
        '503':
          description: LLM unavailable; fallback returned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExamplesResponse' }
  /me:
    get:
      summary: Returns the singleton user
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                type: object
                required: [id, currentLevel, createdAt, accessibilityPrefs]
                properties:
                  id: { type: string, format: uuid }
                  currentLevel: { $ref: '#/components/schemas/CEFRLevel' }
                  createdAt: { type: string }
                  accessibilityPrefs: { type: object, additionalProperties: true }
                  preferredMode:
                    $ref: '#/components/schemas/LessonMode'
                    description: Last mode the user picked; persisted across launches (v1.2.0).
    patch:
      summary: Update the user's level and/or accessibility preferences
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentLevel: { $ref: '#/components/schemas/CEFRLevel' }
                accessibilityPrefs: { type: object, additionalProperties: true }
                preferredMode:
                  $ref: '#/components/schemas/LessonMode'
                  description: Set the user's preferred mode (v1.2.0).
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                type: object
                required: [id, currentLevel, createdAt, accessibilityPrefs]
                properties:
                  id: { type: string, format: uuid }
                  currentLevel: { $ref: '#/components/schemas/CEFRLevel' }
                  createdAt: { type: string }
                  accessibilityPrefs: { type: object, additionalProperties: true }
                  preferredMode:
                    $ref: '#/components/schemas/LessonMode'
                    description: Last mode the user picked; persisted across launches (v1.2.0).
        '400':
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /me/reset:
    post:
      summary: Reset user-specific data (level, lessons, mastery, placement); corpus preserved
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Reset complete
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
  /progress:
    get:
      summary: User progress summary (mastery counts, last/resumable lesson)
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Progress
          content:
            application/json:
              schema:
                type: object
                required: [currentLevel, lessonsCompleted, masteredCount, toReviewCount, perModeMastered, recommendedMode]
                properties:
                  currentLevel: { $ref: '#/components/schemas/CEFRLevel' }
                  lessonsCompleted: { type: integer }
                  masteredCount: { type: integer, description: "Total mastered, summed across modes." }
                  toReviewCount: { type: integer }
                  perModeMastered:
                    type: object
                    description: |
                      Mastered word count per mode (v1.2.0). Keys are LessonMode
                      values. Sum equals masteredCount only by accident — knowing
                      a word in two modes counts twice.
                    properties:
                      read_pick_meaning: { type: integer }
                      listen_pick_word: { type: integer }
                      listen_pick_meaning: { type: integer }
                      listen_type: { type: integer }
                  recommendedMode:
                    $ref: '#/components/schemas/LessonMode'
                    description: |
                      argmax(pendingWordsForMode at user.currentLevel), with LRU
                      tiebreaker. Drives the "Recomendado para ti" badge on
                      Home (v1.2.0).
                  lastLesson:
                    nullable: true
                    type: object
                    properties:
                      lessonId: { type: string, format: uuid }
                      score: { type: integer }
                      total: { type: integer }
                      level: { $ref: '#/components/schemas/CEFRLevel' }
                      completedAt: { type: string }
                  resumable:
                    nullable: true
                    type: object
                    properties:
                      lessonId: { type: string, format: uuid }
                      level: { $ref: '#/components/schemas/CEFRLevel' }
                      answeredCount: { type: integer }
                      totalCount: { type: integer }
  /lessons/{lessonId}:
    get:
      summary: Inspect a lesson (in-progress remaining questions OR completed summary)
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - in: path
          name: lessonId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Lesson
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [state, lessonId, level, answeredCount, totalCount, remaining]
                    properties:
                      state: { type: string, enum: [in_progress] }
                      lessonId: { type: string, format: uuid }
                      level: { $ref: '#/components/schemas/CEFRLevel' }
                      answeredCount: { type: integer }
                      totalCount: { type: integer }
                      remaining:
                        type: array
                        items: { $ref: '#/components/schemas/LessonQuestion' }
                  - type: object
                    required: [state, lessonId, level, score, total, missedWords]
                    properties:
                      state: { type: string, enum: [completed] }
                      lessonId: { type: string, format: uuid }
                      level: { $ref: '#/components/schemas/CEFRLevel' }
                      score: { type: integer }
                      total: { type: integer }
                      missedWords:
                        type: array
                        items:
                          type: object
                          properties:
                            word: { type: string }
                            canonicalDefinition: { type: string }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /words/{word}/definition:
    get:
      summary: RAG-grounded contextual definition for a word at the user's level
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - in: path
          name: word
          required: true
          schema: { type: string }
        - in: query
          name: level
          required: true
          schema: { $ref: '#/components/schemas/CEFRLevel' }
      responses:
        '200':
          description: Definition
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContextualDefinitionResponse' }
        '503':
          description: LLM unavailable; fallback returned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContextualDefinitionResponse' }
  /verbs/{base}/intro:
    get:
      summary: F006 — pre-conjugation "Conoce el verbo" micro-card payload
      description: |
        Returns the bilingual mini-context for a verb. Used by the client once
        per (macInstall, verbBase) immediately before the first
        `conjugate_pick_form` question for that verb. The Spanish example
        keeps its `___` slot — the card pairs the prompt shape with a
        fully-conjugated English translation. Server is stateless about the
        seen-set; clients gate calls themselves via `gramart.verbIntro.seen`
        in UserDefaults.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - in: path
          name: base
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 32
            pattern: '^[a-z]+$'
      responses:
        '200':
          description: Verb intro payload
          content:
            application/json:
              schema:
                type: object
                required: [base, es, exampleEs, exampleEn, audioBase]
                properties:
                  base: { type: string, example: go }
                  es: { type: string, example: ir }
                  exampleEs: { type: string, example: "Ayer ___ al cine con mi hermana." }
                  exampleEn: { type: string, example: "Yesterday I went to the movies with my sister." }
                  audioBase: { type: string, example: go.mp3 }
        '404':
          description: Unknown verb base
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
