# OpenAPI Delta — Feature 003 Writing Modes
#
# STATUS: MERGED into specs/001-vocabulary-lesson-mvp/contracts/openapi.yaml on 2026-05-19
# (T030). The canonical spec is now at info.version 1.3.0. This file is kept as
# a historical record of what F003 added; do not edit it further. Future
# changes go directly into the canonical openapi.yaml.

components:
  schemas:
    LessonMode:
      type: string
      enum:
        - read_pick_meaning
        - listen_pick_word
        - listen_pick_meaning
        - listen_type
        - write_pick_word            # NEW v1.3 — Spanish prompt, 4 English options
        - write_type_word            # NEW v1.3 — Spanish prompt, typed English
        - write_fill_gaps            # NEW v1.3 (P3, may defer to v1.4) — masked English w/ Spanish hint
      description: |
        The mode a lesson is played in. v1.3 adds three write modes:
          - write_pick_word: see Spanish meaning, pick the English word from 4 options
          - write_type_word: see Spanish meaning, type the English word (Levenshtein ≤ 1)
          - write_fill_gaps: see Spanish meaning + masked English (e.g. `w__th_r`), type the gaps

    # Extended (additive — `prompt` is new):
    LessonQuestion:
      type: object
      required: [id, word, options, position]
      properties:
        id: { type: string, format: uuid }
        word:
          type: string
          description: |
            The canonical English word for the question. Used for TTS playback
            and as the answer key. ALWAYS present.
        prompt:
          type: string
          description: |
            v1.3+. Spanish meaning to display in write modes. When the mode is a
            write_* variant, clients MUST render `prompt` as the question
            stimulus instead of `word`. Other modes may omit this field.
        options:
          type: array
          minItems: 4
          maxItems: 4
          items: { type: string }
          description: |
            4 options for option-based modes. Absent (or empty array, depending
            on serializer) for typed modes (listen_type, write_type_word,
            write_fill_gaps).
        position: { type: integer }

    # Extended (additive — `hintUsed` is new):
    AnswerLessonRequest:
      type: object
      required: [questionId, answerMs]
      properties:
        questionId: { type: string, format: uuid }
        optionIndex:
          type: integer
          minimum: 0
          maximum: 3
        typedAnswer:
          type: string
          minLength: 1
          maxLength: 80
        hintUsed:
          type: boolean
          description: |
            v1.3+. Set true when the user revealed letters via the hint button
            (write_type_word, write_fill_gaps). Backend zeroes
            `consecutiveCorrect` on the mastery row, preventing mastery credit
            for this question even if the typed answer is correct. Defaults to
            false / absent.
        answerMs: { type: integer, minimum: 0 }

# No new paths. All changes are additive on existing /v1/lessons and
# /v1/lessons/{id}/answers.
